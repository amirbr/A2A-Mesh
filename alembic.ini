[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# We override sqlalchemy.url at runtime in alembic/env.py via pydantic-settings
sqlalchemy.url = postgresql+asyncpg://a2a_mesh:password@localhost:5435/a2a_mesh

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
