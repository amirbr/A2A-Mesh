services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: a2a_mesh
      POSTGRES_PASSWORD: password
      POSTGRES_DB: a2a_mesh
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a2a_mesh"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: a2a_mesh
      POSTGRES_PASSWORD: password
      POSTGRES_DB: a2a_mesh_test
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U a2a_mesh"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
